services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      ENABLE_SCHEDULER: "false"
      ENABLE_BACKFILL_SCHEDULER: "false"
      BOOTSTRAP_SYNC: "false"
    volumes:
      - ${APP_DATA_DIR:-/var/lib/tro-case-watch/data}:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4127/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      ENABLE_SCHEDULER: "false"
      ENABLE_BACKFILL_SCHEDULER: "false"
      BOOTSTRAP_SYNC: "false"
    command: ["node", "src/server.js", "--worker"]
    volumes:
      - ${APP_DATA_DIR:-/var/lib/tro-case-watch/data}:/app/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
